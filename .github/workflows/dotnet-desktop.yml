name: Desktop Packaging Helper

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: .\global.json

      - name: Restore pinned FFmpeg runtime
        shell: pwsh
        run: .\scripts\Ensure-DevRuntime.ps1

      - name: Build packaged test drop
        shell: pwsh
        run: .\scripts\Build-TestDrop.ps1

      - name: Upload release zip
        id: upload_release_zip
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: FramePlayer-TestDrop-${{ github.run_number }}
          path: artifacts/FramePlayer-CustomFFmpeg-*.zip
          if-no-files-found: error

      - name: Attest release zip provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: FramePlayer-TestDrop-${{ github.run_number }}
          subject-digest: sha256:${{ steps.upload_release_zip.outputs.artifact-digest }}

      - name: Upload packaged folder
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: FramePlayer-TestDrop-Folder-${{ github.run_number }}
          path: bin/TestDrop/**
          if-no-files-found: error
