name: macOS Avalonia

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          cargo --version

      - name: Restore pinned FFmpeg runtime
        run: |
          manifest_path="Runtime/macos/osx-arm64/ffmpeg-runtime-manifest.json"
          runtime_dir="Runtime/macos/osx-arm64/ffmpeg"
          extract_dir="$RUNNER_TEMP/frameplayer-ffmpeg-runtime"
          asset_name="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["assetName"])' "$manifest_path")"
          asset_url="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["assetUrl"])' "$manifest_path")"
          asset_sha256="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["assetSha256"])' "$manifest_path")"

          case "$asset_name" in
            ""|*/*|*\\*) echo "Invalid runtime asset name: $asset_name" >&2; exit 2 ;;
          esac
          case "$asset_url" in
            "https://github.com/jfleezy23/frame-player/releases/download/v2.0.0/$asset_name") ;;
            *) echo "Unexpected runtime asset URL: $asset_url" >&2; exit 2 ;;
          esac

          archive_path="$RUNNER_TEMP/$asset_name"
          curl --fail --location --proto '=https' --tlsv1.2 "$asset_url" --output "$archive_path"
          printf '%s  %s\n' "$asset_sha256" "$archive_path" | shasum -a 256 -c -

          rm -rf "$extract_dir"
          mkdir -p "$extract_dir" "$runtime_dir"
          /usr/bin/ditto -x -k "$archive_path" "$extract_dir"
          (
            cd "$extract_dir"
            shasum -a 256 -c "$GITHUB_WORKSPACE/$runtime_dir/SHA256SUMS.txt"
            cmp -s build-provenance.txt "$GITHUB_WORKSPACE/$runtime_dir/build-provenance.txt"
            for dylib in *.dylib; do
              test "$(otool -l "$dylib" | awk '$1 == "minos" { print $2; exit }')" = '13.0'
            done
          )
          cp "$extract_dir/"*.dylib "$runtime_dir/"

      - name: Build Rust FFmpeg probe
        run: scripts/Build-RustFfmpegProbe.sh osx-arm64

      - name: Restore
        run: |
          dotnet restore src/FramePlayer.Avalonia/FramePlayer.Avalonia.csproj -r osx-arm64
          dotnet restore tests/FramePlayer.Core.Tests/FramePlayer.Core.Tests.csproj -r osx-arm64
          dotnet restore tests/FramePlayer.Avalonia.Tests/FramePlayer.Avalonia.Tests.csproj -r osx-arm64

      - name: Build
        run: |
          dotnet build src/FramePlayer.Avalonia/FramePlayer.Avalonia.csproj -c Release -r osx-arm64 --no-restore

      - name: Test
        run: |
          dotnet test tests/FramePlayer.Core.Tests/FramePlayer.Core.Tests.csproj -c Release -r osx-arm64 --no-restore
          dotnet test tests/FramePlayer.Avalonia.Tests/FramePlayer.Avalonia.Tests.csproj -c Release -r osx-arm64 --no-restore --filter "Category!=ReleaseCandidate"

      - name: Bundle smoke test
        run: |
          PACKAGE_VERSION=2.0.0-rc.1 script/package_unified_macos_release.sh --unsigned
          zip_path="artifacts/2.0.0-rc.1/FramePlayer-macOS-arm64-2.0.0-rc.1.zip"
          sha_path="$zip_path.sha256"
          test -f "$zip_path"
          test -f "$sha_path"
          shasum -a 256 -c "$sha_path"
          extract_dir="$RUNNER_TEMP/unified-macos-package"
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"
          /usr/bin/ditto -x -k "$zip_path" "$extract_dir"
          app_path="$(find "$extract_dir" -maxdepth 2 -type d -name "Frame Player.app" -print -quit)"
          if [[ -z "$app_path" ]]; then
            find "$extract_dir" -maxdepth 4 -print
            echo "Extracted package did not contain Frame Player.app" >&2
            exit 1
          fi
          executable_path="$app_path/Contents/MacOS/FramePlayer.Avalonia"
          if [[ ! -f "$executable_path" ]]; then
            find "$app_path/Contents/MacOS" -maxdepth 3 -print
            echo "Extracted package is missing FramePlayer.Avalonia" >&2
            exit 1
          fi
          chmod +x "$executable_path"
          if [[ ! -x "$executable_path" ]]; then
            ls -l "$executable_path"
            echo "Extracted FramePlayer.Avalonia is not executable" >&2
            exit 1
          fi

          for required_path in \
            "$app_path/Contents/MacOS/libframeplayer_ffmpeg_probe.dylib" \
            "$app_path/Contents/MacOS/Runtime/runtime-manifest.json" \
            "$app_path/Contents/MacOS/Runtime/export-runtime-manifest.json" \
            "$app_path/Contents/MacOS/Runtime/macos/osx-arm64/ffmpeg-runtime-manifest.json" \
            "$app_path/Contents/MacOS/Runtime/macos/osx-arm64/ffmpeg/SHA256SUMS.txt" \
            "$app_path/Contents/MacOS/Runtime/macos/osx-arm64/ffmpeg/build-provenance.txt"; do
            if [[ ! -f "$required_path" ]]; then
              find "$app_path/Contents/MacOS/Runtime" -maxdepth 5 -print
              echo "Extracted package is missing required runtime file: $required_path" >&2
              exit 1
            fi
          done

          bundle_version="$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$app_path/Contents/Info.plist")"
          bundle_id="$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$app_path/Contents/Info.plist")"
          if [[ "$bundle_version" != "2.0.0" ]]; then
            echo "Expected CFBundleShortVersionString 2.0.0 but found $bundle_version" >&2
            exit 1
          fi
          if [[ "$bundle_id" != "com.frameplayer" ]]; then
            echo "Expected CFBundleIdentifier com.frameplayer but found $bundle_id" >&2
            exit 1
          fi
