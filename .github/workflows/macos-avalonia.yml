name: macOS Avalonia

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          cargo --version

      - name: Cache pinned FFmpeg runtime
        id: cache_ffmpeg_runtime
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: Runtime/macos/osx-arm64/ffmpeg/*.dylib
          key: macos-arm64-ffmpeg-n8.1.2-${{ hashFiles('scripts/ffmpeg/Build-FFmpeg-macOS-8.1.sh', 'Runtime/macos/osx-arm64/ffmpeg/SHA256SUMS.txt') }}

      - name: Build pinned FFmpeg runtime
        if: steps.cache_ffmpeg_runtime.outputs.cache-hit != 'true'
        run: |
          work_root="$RUNNER_TEMP/frameplayer-ffmpeg-macos-8.1.2-source-build"
          mkdir -p "$work_root"
          WORK_ROOT="$work_root" RUNTIME_DIR="$work_root/runtime" \
            scripts/ffmpeg/Build-FFmpeg-macOS-8.1.sh
          cp "$work_root/runtime/"*.dylib Runtime/macos/osx-arm64/ffmpeg/

      - name: Validate pinned FFmpeg runtime
        run: |
          cd Runtime/macos/osx-arm64/ffmpeg
          shasum -a 256 -c SHA256SUMS.txt

      - name: Restore
        run: |
          dotnet restore src/FramePlayer.Avalonia/FramePlayer.Avalonia.csproj
          dotnet restore tests/FramePlayer.Core.Tests/FramePlayer.Core.Tests.csproj
          dotnet restore tests/FramePlayer.Avalonia.Tests/FramePlayer.Avalonia.Tests.csproj

      - name: Build
        run: |
          dotnet build src/FramePlayer.Avalonia/FramePlayer.Avalonia.csproj -c Release --no-restore

      - name: Test
        run: |
          dotnet test tests/FramePlayer.Core.Tests/FramePlayer.Core.Tests.csproj -c Release --no-restore
          dotnet test tests/FramePlayer.Avalonia.Tests/FramePlayer.Avalonia.Tests.csproj -c Release --no-restore --filter "Category!=ReleaseCandidate"

      - name: Bundle smoke test
        run: |
          PACKAGE_VERSION=2.0.0-rc.1 script/package_unified_macos_release.sh --unsigned
          zip_path="artifacts/2.0.0-rc.1/FramePlayer-macOS-arm64-2.0.0-rc.1.zip"
          sha_path="$zip_path.sha256"
          test -f "$zip_path"
          test -f "$sha_path"
          shasum -a 256 -c "$sha_path"
          extract_dir="$RUNNER_TEMP/unified-macos-package"
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"
          /usr/bin/ditto -x -k "$zip_path" "$extract_dir"
          app_path="$(find "$extract_dir" -maxdepth 2 -type d -name "Frame Player.app" -print -quit)"
          if [[ -z "$app_path" ]]; then
            find "$extract_dir" -maxdepth 4 -print
            echo "Extracted package did not contain Frame Player.app" >&2
            exit 1
          fi
          executable_path="$app_path/Contents/MacOS/FramePlayer.Avalonia"
          if [[ ! -f "$executable_path" ]]; then
            find "$app_path/Contents/MacOS" -maxdepth 3 -print
            echo "Extracted package is missing FramePlayer.Avalonia" >&2
            exit 1
          fi
          chmod +x "$executable_path"
          if [[ ! -x "$executable_path" ]]; then
            ls -l "$executable_path"
            echo "Extracted FramePlayer.Avalonia is not executable" >&2
            exit 1
          fi

          for required_path in \
            "$app_path/Contents/MacOS/libframeplayer_ffmpeg_probe.dylib" \
            "$app_path/Contents/MacOS/Runtime/runtime-manifest.json" \
            "$app_path/Contents/MacOS/Runtime/export-runtime-manifest.json" \
            "$app_path/Contents/MacOS/Runtime/macos/osx-arm64/ffmpeg/SHA256SUMS.txt" \
            "$app_path/Contents/MacOS/Runtime/macos/osx-arm64/ffmpeg/build-provenance.txt"; do
            if [[ ! -f "$required_path" ]]; then
              find "$app_path/Contents/MacOS/Runtime" -maxdepth 5 -print
              echo "Extracted package is missing required runtime file: $required_path" >&2
              exit 1
            fi
          done

          bundle_version="$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$app_path/Contents/Info.plist")"
          bundle_id="$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$app_path/Contents/Info.plist")"
          if [[ "$bundle_version" != "2.0.0" ]]; then
            echo "Expected CFBundleShortVersionString 2.0.0 but found $bundle_version" >&2
            exit 1
          fi
          if [[ "$bundle_id" != "com.frameplayer" ]]; then
            echo "Expected CFBundleIdentifier com.frameplayer but found $bundle_id" >&2
            exit 1
          fi
