name: macOS Avalonia

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Restore
        run: |
          dotnet restore src/FramePlayer.Mac/FramePlayer.Mac.csproj
          dotnet restore tests/FramePlayer.Mac.Tests/FramePlayer.Mac.Tests.csproj

      - name: Build
        run: dotnet build src/FramePlayer.Mac/FramePlayer.Mac.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/FramePlayer.Mac.Tests/FramePlayer.Mac.Tests.csproj -c Release --no-restore --filter "Category!=ReleaseCandidate"
