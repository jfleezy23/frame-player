name: Windows CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v5
        with:
          global-json-file: .\global.json

      - name: Setup Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add clippy rustfmt
          cargo --version

      - name: Check spelling
        shell: pwsh
        run: |
          $toolsDirectory = Join-Path $env:RUNNER_TEMP "frameplayer-typos"
          $archivePath = Join-Path $toolsDirectory "typos.zip"
          $extractPath = Join-Path $toolsDirectory "extracted"
          $expectedHash = "8773b1b3029b1e149b7bd676785b065b236173a7509bc9ab19fa64e638ae989a"
          New-Item -ItemType Directory -Force -Path $toolsDirectory | Out-Null
          Invoke-WebRequest `
              -Uri "https://github.com/crate-ci/typos/releases/download/v1.47.0/typos-v1.47.0-x86_64-pc-windows-msvc.zip" `
              -OutFile $archivePath
          $actualHash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
              throw "typos archive hash mismatch. Expected $expectedHash, got $actualHash."
          }

          Expand-Archive -LiteralPath $archivePath -DestinationPath $extractPath -Force
          $typosExecutable = Get-ChildItem -LiteralPath $extractPath -Filter "typos.exe" -File -Recurse |
              Select-Object -First 1
          if ($null -eq $typosExecutable) {
              throw "typos.exe was not found in the verified archive."
          }

          & $typosExecutable.FullName

      - name: Validate repository text and path casing
        shell: pwsh
        run: .\scripts\Test-RepositoryTextHygiene.ps1

      - name: Enforce workflow action pinning
        shell: pwsh
        run: .\scripts\Test-WorkflowActionPinning.ps1

      - name: Validate harness scripts
        shell: pwsh
        run: .\scripts\Test-RepoHarnessScripts.ps1

      - name: Analyze PowerShell scripts
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force
          $findings = @(
              Invoke-ScriptAnalyzer -Path .\scripts -Recurse -Settings .\.psscriptanalyzer.psd1
          )
          if ($findings.Count -gt 0) {
              $findings | Format-Table -AutoSize | Out-String | Write-Host
              throw "PSScriptAnalyzer reported $($findings.Count) error or warning findings."
          }

      - name: Install pinned shell linters
        shell: pwsh
        run: |
          $toolsDirectory = Join-Path $env:RUNNER_TEMP "frameplayer-hygiene-tools"
          New-Item -ItemType Directory -Force -Path $toolsDirectory | Out-Null
          $tools = @(
              @{
                  Name = "shellcheck"
                  Uri = "https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.zip"
                  Sha256 = "8a4e35ab0b331c85d73567b12f2a444df187f483e5079ceffa6bda1faa2e740e"
                  Executable = "shellcheck.exe"
              },
              @{
                  Name = "actionlint"
                  Uri = "https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_windows_amd64.zip"
                  Sha256 = "6e7241b51e6817ea6a047693d8e6fed13b31819c9a0dd6c5a726e1592d22f6e9"
                  Executable = "actionlint.exe"
              }
          )
          foreach ($tool in $tools) {
              $archivePath = Join-Path $toolsDirectory "$($tool.Name).zip"
              $extractPath = Join-Path $toolsDirectory $tool.Name
              Invoke-WebRequest -Uri $tool.Uri -OutFile $archivePath
              $actualHash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($actualHash -ne $tool.Sha256) {
                  throw "$($tool.Name) archive hash mismatch. Expected $($tool.Sha256), got $actualHash."
              }

              Expand-Archive -LiteralPath $archivePath -DestinationPath $extractPath -Force
              $executable = Get-ChildItem -LiteralPath $extractPath -Filter $tool.Executable -File -Recurse |
                  Select-Object -First 1
              if ($null -eq $executable) {
                  throw "$($tool.Executable) was not found in the verified $($tool.Name) archive."
              }

              Copy-Item -LiteralPath $executable.FullName -Destination $toolsDirectory -Force
          }

          $toolsDirectory >> $env:GITHUB_PATH

      - name: Analyze shell scripts and workflows
        shell: pwsh
        run: |
          shellcheck --version
          actionlint -version
          $shellScripts = @(git ls-files "*.sh")
          if ($shellScripts.Count -gt 0) {
              shellcheck --severity=warning $shellScripts
          }
          actionlint -shellcheck "shellcheck"

      - name: Validate Rust formatting and lints
        shell: pwsh
        run: |
          cargo fmt --manifest-path .\native\frameplayer_ffmpeg_probe\Cargo.toml --all -- --check
          cargo clippy --manifest-path .\native\frameplayer_ffmpeg_probe\Cargo.toml --all-targets --all-features --locked -- -D warnings

      - name: Restore pinned FFmpeg runtime
        shell: pwsh
        run: .\scripts\Ensure-DevRuntime.ps1

      - name: Restore pinned FFmpeg export tools
        shell: pwsh
        run: .\scripts\Ensure-DevExportTools.ps1

      - name: Restore pinned FFmpeg export runtime
        shell: pwsh
        run: .\scripts\Ensure-DevExportRuntime.ps1 -Required

      - name: Build Rust FFmpeg probe
        shell: pwsh
        run: .\scripts\Build-RustFfmpegProbe.ps1 -RuntimeIdentifier win-x64

      - name: Restore and build
        shell: pwsh
        run: |
          dotnet build .\src\FramePlayer.Avalonia\FramePlayer.Avalonia.csproj -c Release -r win-x64

      - name: Verify C# formatting
        shell: pwsh
        run: |
          dotnet format .\src\FramePlayer.Avalonia\FramePlayer.Avalonia.csproj whitespace --verify-no-changes --no-restore
          dotnet format .\tests\FramePlayer.Core.Tests\FramePlayer.Core.Tests.csproj whitespace --verify-no-changes --no-restore
          dotnet format .\tests\FramePlayer.Avalonia.Tests\FramePlayer.Avalonia.Tests.csproj whitespace --verify-no-changes --no-restore
          dotnet format .\src\FramePlayer.Avalonia\FramePlayer.Avalonia.csproj analyzers --diagnostics IDE1006 --severity warn --verify-no-changes --no-restore
          dotnet format .\tests\FramePlayer.Core.Tests\FramePlayer.Core.Tests.csproj analyzers --diagnostics IDE1006 --severity warn --verify-no-changes --no-restore
          dotnet format .\tests\FramePlayer.Avalonia.Tests\FramePlayer.Avalonia.Tests.csproj analyzers --diagnostics IDE1006 --severity warn --verify-no-changes --no-restore

      - name: Run cold-path unit tests
        shell: pwsh
        run: |
          dotnet test .\tests\FramePlayer.Core.Tests\FramePlayer.Core.Tests.csproj -c Release -r win-x64
          dotnet test .\tests\FramePlayer.Avalonia.Tests\FramePlayer.Avalonia.Tests.csproj -c Release -r win-x64 --filter "Category!=ReleaseCandidate"

      - name: Package unified Windows build
        shell: pwsh
        run: |
          .\scripts\Package-UnifiedWindows.ps1

          $packageVersion = "2.1.0-rc.3"
          $artifactRoot = "artifacts\$packageVersion"
          $zipPath = Join-Path $artifactRoot "FramePlayer-Windows-x64-$packageVersion.zip"
          $shaPath = "$zipPath.sha256"
          if (-not (Test-Path $zipPath)) { throw "Missing unified Windows ZIP: $zipPath" }
          if (-not (Test-Path $shaPath)) { throw "Missing unified Windows SHA256 sidecar: $shaPath" }

          $expectedHash = ((Get-Content $shaPath -Raw).Trim() -split '\s+')[0]
          $actualHash = (Get-FileHash -Algorithm SHA256 $zipPath).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
              throw "Unified Windows ZIP hash mismatch. Expected $expectedHash but got $actualHash."
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "unified-windows-package"
          if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $requiredFiles = @(
              "FramePlayer.Avalonia.exe",
              "frameplayer_ffmpeg_probe.dll",
              "avcodec-62.dll",
              "avformat-62.dll",
              "avutil-60.dll",
              "swresample-6.dll",
              "swscale-9.dll",
              "ffmpeg-export\avfilter-11.dll",
              "Runtime\runtime-manifest.json",
              "Runtime\export-runtime-manifest.json",
              "LICENSE",
              "THIRD_PARTY_NOTICES.md"
          )
          foreach ($relativePath in $requiredFiles) {
              $fullPath = Join-Path $extractDir $relativePath
              if (-not (Test-Path $fullPath)) {
                  throw "Extracted unified Windows ZIP is missing: $relativePath"
              }
          }

          $exePath = Join-Path $extractDir "FramePlayer.Avalonia.exe"
          $productVersion = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exePath).ProductVersion
          if ($productVersion -ne $packageVersion) {
              throw "Extracted executable product version '$productVersion' did not match package version '$packageVersion'."
          }
