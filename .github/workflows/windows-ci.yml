name: Windows CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: .\global.json

      - name: Enforce workflow action pinning
        shell: pwsh
        run: .\scripts\Test-WorkflowActionPinning.ps1

      - name: Validate harness scripts
        shell: pwsh
        run: .\scripts\Test-RepoHarnessScripts.ps1

      - name: Restore pinned FFmpeg runtime
        shell: pwsh
        run: .\scripts\Ensure-DevRuntime.ps1

      - name: Restore pinned FFmpeg export tools
        shell: pwsh
        run: .\scripts\Ensure-DevExportTools.ps1

      - name: Restore pinned FFmpeg export runtime
        shell: pwsh
        run: .\scripts\Ensure-DevExportRuntime.ps1 -Required

      - name: Restore and build
        shell: pwsh
        run: dotnet build .\FramePlayer.csproj -c Release -p:Platform=x64

      - name: Run cold-path unit tests
        shell: pwsh
        run: dotnet test .\tests\FramePlayer.Core.Tests\FramePlayer.Core.Tests.csproj -c Release
