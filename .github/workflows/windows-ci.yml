name: Windows CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v3

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore pinned FFmpeg runtime
        shell: pwsh
        run: .\scripts\Ensure-DevRuntime.ps1

      - name: Restore and build
        shell: pwsh
        run: msbuild .\FramePlayer.csproj /t:Restore,Build /p:Configuration=Release /p:Platform=x64
