name: Windows CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: .\global.json

      - name: Restore pinned FFmpeg runtime
        shell: pwsh
        run: .\scripts\Ensure-DevRuntime.ps1

      - name: Restore and build
        shell: pwsh
        run: dotnet build .\FramePlayer.csproj -c Release -p:Platform=x64
