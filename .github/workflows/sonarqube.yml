name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve SonarQube configuration
        id: sonar_config
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $token = $env:SONAR_TOKEN
          if ([string]::IsNullOrWhiteSpace($token)) {
            "enabled=false" >> $env:GITHUB_OUTPUT
            Write-Host "::notice::SONAR_TOKEN is not configured for this repository. Skipping SonarQube analysis."
            exit 0
          }

          $organization = "${{ vars.SONAR_ORGANIZATION }}"
          if ([string]::IsNullOrWhiteSpace($organization)) {
            $organization = "${{ github.repository_owner }}"
          }

          $projectKey = "${{ vars.SONAR_PROJECT_KEY }}"
          if ([string]::IsNullOrWhiteSpace($projectKey)) {
            $projectKey = "${{ github.repository_owner }}_${{ github.event.repository.name }}"
          }

          "enabled=true" >> $env:GITHUB_OUTPUT
          "organization=$organization" >> $env:GITHUB_OUTPUT
          "project_key=$projectKey" >> $env:GITHUB_OUTPUT

      - name: Setup Java
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET SDK
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: .\global.json

      - name: Cache SonarQube packages
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        if: steps.sonar_config.outputs.enabled == 'true'
        id: cache-sonar-scanner
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.sonar_config.outputs.enabled == 'true' && steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory -Force | Out-Null
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Restore pinned FFmpeg runtime
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: pwsh
        run: .\scripts\Ensure-DevRuntime.ps1

      - name: Build and analyze
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          # These desktop review/export flows are exercised by the app-driven
          # regression suite rather than imported .NET line-coverage reports.
          # The macOS preview copies shared-looking source into src/FramePlayer.*
          # to protect the Windows release path. Keep these exclusions
          # explicitly scoped to the current preview subtrees instead of using
          # future-proof wildcards such as src/FramePlayer.Core/**.
          $coverageExclusions = @(
            "App.xaml.cs"
            "Controls/LoopRangeOverlay.cs"
            "CompareSideBySideExportOptionsWindow.xaml.cs"
            "Core/Models/AudioInsertion*.cs"
            "Core/Models/ClipExport*.cs"
            "Core/Models/CompareSideBySideExport*.cs"
            "Core/Models/ExportHost*.cs"
            "Core/Models/LoopPlaybackRangeSnapshot.cs"
            "Core/Models/PaneViewportSnapshot.cs"
            "Core/Coordination/ReviewWorkspaceCoordinator.cs"
            "Diagnostics/ExportHostCli.cs"
            "Diagnostics/ReviewEngineComparisonRunner.cs"
            "Diagnostics/ReviewEngineManualTest*.cs"
            "Diagnostics/RegressionSuiteCli.cs"
            "Diagnostics/WorkspaceCoordinatorProbe.cs"
            "Services/AudioInsertionService.cs"
            "Services/ClipExportService.cs"
            "Services/CompareSideBySideExportService.cs"
            "Services/DecodedFrameBudgetCoordinator.cs"
            "Services/DiagnosticLogService.cs"
            "Services/ExportHostClient.cs"
            "Services/ExportRuntimeManifestService.cs"
            "Services/ExportToolsManifestService.cs"
            "Services/FfmpegCliTooling.cs"
            "Services/FfmpegExportTiming.cs"
            "Services/FrameSurfaceGeometry.cs"
            "Services/MediaProbeService.cs"
            "Services/NativeAudioInsertionService.cs"
            "Services/NativeClipExportService.cs"
            "Services/NativeCompareSideBySideExportService.cs"
            "Services/NativeExportSupport.cs"
            "Services/RuntimeManifestService.cs"
            "Services/AppInstanceLauncher.cs"
            "Engines/FFmpeg/FfmpegReviewEngine.cs"
            "MainWindow.xaml.cs"
            "Diagnostics/RegressionSuiteRunner.cs"
            "VideoInfoWindow.xaml.cs"
            "src/FramePlayer.Mac/**"
            "src/FramePlayer.Mac/Views/**"
            "src/FramePlayer.Mac/Services/AvaloniaFrameBufferPresenter.cs"
            "src/FramePlayer.Mac/Services/MacRecentFilesService.cs"
            "src/FramePlayer.Mac/Services/*Export*.cs"
            "src/FramePlayer.Mac/Services/MediaProbeService.cs"
            "src/FramePlayer.Mac/Services/Native*.cs"
            "src/FramePlayer.Mac/Diagnostics/ExportHostCli.cs"
            "src/FramePlayer.Core/Core/Abstractions/IVideoReviewEngine.cs"
            "src/FramePlayer.Core/Core/Coordination/MultiVideoWorkspaceState.cs"
            "src/FramePlayer.Core/Core/Coordination/ReviewPaneState.cs"
            "src/FramePlayer.Core/Core/Coordination/ReviewSessionCoordinator.cs"
            "src/FramePlayer.Core/Core/Coordination/ReviewWorkspaceCoordinator.cs"
            "src/FramePlayer.Core/Core/Coordination/ReviewWorkspaceOperationResult.cs"
            "src/FramePlayer.Core/Core/Coordination/ReviewWorkspacePaneOperationOutcome.cs"
            "src/FramePlayer.Core/Core/Coordination/ReviewWorkspacePaneOperationResult.cs"
            "src/FramePlayer.Core/Core/Coordination/ReviewWorkspacePaneSnapshot.cs"
            "src/FramePlayer.Core/Core/Coordination/ReviewWorkspacePreparationPhase.cs"
            "src/FramePlayer.Core/Core/Coordination/ReviewWorkspacePreparationState.cs"
            "src/FramePlayer.Core/Core/Coordination/ReviewWorkspaceSnapshot.cs"
            "src/FramePlayer.Core/Core/Coordination/SynchronizedOperationScope.cs"
            "src/FramePlayer.Core/Core/Coordination/TimelineSynchronizationMode.cs"
            "src/FramePlayer.Core/Core/Coordination/WorkspacePaneSelectionMode.cs"
            "src/FramePlayer.Core/Core/Events/FramePresentedEventArgs.cs"
            "src/FramePlayer.Core/Core/Events/ReviewSessionChangedEventArgs.cs"
            "src/FramePlayer.Core/Core/Events/ReviewWorkspaceChangedEventArgs.cs"
            "src/FramePlayer.Core/Core/Events/ReviewWorkspacePreparationChangedEventArgs.cs"
            "src/FramePlayer.Core/Core/Events/VideoReviewEngineStateChangedEventArgs.cs"
            "src/FramePlayer.Core/Core/Models/AudioInsertionPlan.cs"
            "src/FramePlayer.Core/Core/Models/AudioInsertionRequest.cs"
            "src/FramePlayer.Core/Core/Models/AudioInsertionResult.cs"
            "src/FramePlayer.Core/Core/Models/ClipExportPlan.cs"
            "src/FramePlayer.Core/Core/Models/ClipExportRequest.cs"
            "src/FramePlayer.Core/Core/Models/ClipExportResult.cs"
            "src/FramePlayer.Core/Core/Models/CompareSideBySideExportAudioSource.cs"
            "src/FramePlayer.Core/Core/Models/CompareSideBySideExportMode.cs"
            "src/FramePlayer.Core/Core/Models/CompareSideBySideExportPlan.cs"
            "src/FramePlayer.Core/Core/Models/CompareSideBySideExportRequest.cs"
            "src/FramePlayer.Core/Core/Models/CompareSideBySideExportResult.cs"
            "src/FramePlayer.Core/Core/Models/DecodedFrameBuffer.cs"
            "src/FramePlayer.Core/Core/Models/ExportHostRequest.cs"
            "src/FramePlayer.Core/Core/Models/ExportHostResponse.cs"
            "src/FramePlayer.Core/Core/Models/FrameDescriptor.cs"
            "src/FramePlayer.Core/Core/Models/FrameStepResult.cs"
            "src/FramePlayer.Core/Core/Models/LoopPlaybackRangeSnapshot.cs"
            "src/FramePlayer.Core/Core/Models/PaneViewportSnapshot.cs"
            "src/FramePlayer.Core/Core/Models/ReviewPlaybackState.cs"
            "src/FramePlayer.Core/Core/Models/ReviewPosition.cs"
            "src/FramePlayer.Core/Core/Models/ReviewSessionSnapshot.cs"
            "src/FramePlayer.Core/Core/Models/VideoMediaInfo.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/AudioOutputFactory.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegAudioPlaybackSession.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegAudioStreamInfo.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegDecodedFrameCache.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegFrameConverter.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegGlobalFrameIndex.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegHardwareDeviceCache.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegNativeHelpers.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegReviewEngine.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegReviewEngineOptions.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/GpuBackendPreference.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/IAudioOutput.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/MacAudioQueueOutput.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/ManagedAudioClockOutput.cs"
            "src/FramePlayer.Engine.FFmpeg/Services/AppPreferences.cs"
            "src/FramePlayer.Engine.FFmpeg/Services/AppPreferencesService.cs"
            "src/FramePlayer.Engine.FFmpeg/Services/DecodedFrameBudgetCoordinator.cs"
            "src/FramePlayer.Engine.FFmpeg/Services/FfmpegReviewEngineOptionsProvider.cs"
            "src/FramePlayer.Engine.FFmpeg/Services/VideoReviewEngineFactory.cs"
            "src/FramePlayer.Engine.FFmpeg/FfmpegRuntimeBootstrap.cs"
            "src/FramePlayer.Engine.FFmpeg/Properties/AssemblyInfo.cs"
            "scripts/ui_loop_visible_test.py"
          ) -join ","

          # The DLL-only export host and native FFmpeg interop layer are exercised
          # through dedicated host integration tests and app-driven regression
          # suites rather than imported Sonar line coverage, and they necessarily
          # use unsafe/native patterns that would otherwise dominate PR hotspot
          # review. Keep the gate focused on the app surface that Sonar can
          # evaluate directly from this workflow.
          $analysisExclusions = @(
            "Core/Models/ExportHost*.cs"
            "Diagnostics/ExportHostCli.cs"
            "Services/ExportHostClient.cs"
            "Services/ExportRuntimeManifestService.cs"
            "Services/MediaProbeService.cs"
            "Services/NativeAudioInsertionService.cs"
            "Services/NativeClipExportService.cs"
            "Services/NativeCompareSideBySideExportService.cs"
            "Services/NativeExportSupport.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegAudioPlaybackSession.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegFrameConverter.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegGlobalFrameIndex.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegHardwareDeviceCache.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegNativeHelpers.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/FfmpegReviewEngine.cs"
            "src/FramePlayer.Mac/Services/AvaloniaFrameBufferPresenter.cs"
          ) -join ","

          # These files intentionally mirror manifest schemas or manual report
          # projections. Excluding them from duplication keeps the gate focused
          # on production logic rather than stable transport/report shapes.
          $duplicationExclusions = @(
            "Diagnostics/ReviewEngineManualTestCli.cs"
            "Services/ExportToolsManifestService.cs"
            "Services/RuntimeManifestService.cs"
            "src/FramePlayer.Core/Core/**"
            "src/FramePlayer.Engine.FFmpeg/**"
            "src/FramePlayer.Mac/Core/Models/**"
            "src/FramePlayer.Mac/Services/*Export*.cs"
          ) -join ","

          .\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"${{ steps.sonar_config.outputs.project_key }}" `
            /o:"${{ steps.sonar_config.outputs.organization }}" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.exclusions="$analysisExclusions" `
            /d:sonar.coverage.exclusions="$coverageExclusions" `
            /d:sonar.cpd.exclusions="$duplicationExclusions"

          dotnet build .\FramePlayer.csproj -c Release -p:Platform=x64
          dotnet build .\src\FramePlayer.Mac\FramePlayer.Mac.csproj -c Release

          .\.sonar\scanner\dotnet-sonarscanner end `
            /d:sonar.token="$env:SONAR_TOKEN"
