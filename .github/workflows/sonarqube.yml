name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SONAR_SCANNER_VERSION: '11.2.1'
  DOTNET_COVERAGE_VERSION: '18.9.0'

jobs:
  analyze:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve SonarQube configuration
        id: sonar_config
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $token = $env:SONAR_TOKEN
          if ([string]::IsNullOrWhiteSpace($token)) {
            "enabled=false" >> $env:GITHUB_OUTPUT
            Write-Host "::notice::SONAR_TOKEN is not configured for this repository. Skipping SonarQube analysis."
            exit 0
          }

          $organization = "${{ vars.SONAR_ORGANIZATION }}"
          if ([string]::IsNullOrWhiteSpace($organization)) {
            $organization = "${{ github.repository_owner }}"
          }

          $projectKey = "${{ vars.SONAR_PROJECT_KEY }}"
          if ([string]::IsNullOrWhiteSpace($projectKey)) {
            $projectKey = "${{ github.repository_owner }}_${{ github.event.repository.name }}"
          }

          "enabled=true" >> $env:GITHUB_OUTPUT
          "organization=$organization" >> $env:GITHUB_OUTPUT
          "project_key=$projectKey" >> $env:GITHUB_OUTPUT

      - name: Setup Java
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET SDK
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: .\global.json

      - name: Cache SonarQube packages
        if: steps.sonar_config.outputs.enabled == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        if: steps.sonar_config.outputs.enabled == 'true'
        id: cache-sonar-scanner
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner-${{ env.SONAR_SCANNER_VERSION }}

      - name: Install SonarQube scanner
        if: steps.sonar_config.outputs.enabled == 'true' && steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory -Force | Out-Null
          dotnet tool install dotnet-sonarscanner --tool-path .\.sonar\scanner --version $env:SONAR_SCANNER_VERSION

      - name: Cache .NET coverage tool
        if: steps.sonar_config.outputs.enabled == 'true'
        id: cache-dotnet-coverage
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: .sonar/coverage-tool
          key: ${{ runner.os }}-dotnet-coverage-${{ env.DOTNET_COVERAGE_VERSION }}

      - name: Install .NET coverage tool
        if: steps.sonar_config.outputs.enabled == 'true' && steps.cache-dotnet-coverage.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -Path .\.sonar\coverage-tool -ItemType Directory -Force | Out-Null
          dotnet tool install dotnet-coverage --tool-path .\.sonar\coverage-tool --version $env:DOTNET_COVERAGE_VERSION

      - name: Restore pinned FFmpeg runtime
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: pwsh
        run: .\scripts\Ensure-DevRuntime.ps1

      - name: Build and analyze
        if: steps.sonar_config.outputs.enabled == 'true'
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $coverageExclusions = @(
            "src/FramePlayer.Avalonia/Views/MainWindow.axaml.cs"
            "src/FramePlayer.Avalonia/Services/Native*.cs"
            "src/FramePlayer.Avalonia/Services/MediaProbeService.cs"
            "src/FramePlayer.Avalonia/Services/AvaloniaFrameBufferPresenter.cs"
            "src/FramePlayer.Engine.FFmpeg/Engines/FFmpeg/**"
            "native/frameplayer_ffmpeg_probe/src/**"
          ) -join ","

          $duplicationExclusions = "native/frameplayer_ffmpeg_probe/src/**"

          .\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"${{ steps.sonar_config.outputs.project_key }}" `
            /o:"${{ steps.sonar_config.outputs.organization }}" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.coverage.exclusions="$coverageExclusions" `
            /d:sonar.cs.vscoveragexml.reportsPaths=".sonar/coverage/coverage.xml" `
            /d:sonar.cpd.exclusions="$duplicationExclusions" `
            /d:sonar.qualitygate.wait=true `
            /d:sonar.qualitygate.timeout=300

          dotnet build .\src\FramePlayer.Avalonia\FramePlayer.Avalonia.csproj -c Release

          $coverageDirectory = ".\.sonar\coverage"
          $coverageTool = ".\.sonar\coverage-tool\dotnet-coverage.exe"
          $coreCoverage = Join-Path $coverageDirectory "core.coverage"
          $avaloniaCoverage = Join-Path $coverageDirectory "avalonia.coverage"
          $mergedCoverage = Join-Path $coverageDirectory "coverage.xml"
          $coreTestResults = Join-Path $coverageDirectory "core-test-results"
          $avaloniaTestResults = Join-Path $coverageDirectory "avalonia-test-results"
          New-Item -Path $coverageDirectory -ItemType Directory -Force | Out-Null

          & $coverageTool collect --output $coreCoverage --output-format coverage -- `
            dotnet test .\tests\FramePlayer.Core.Tests\FramePlayer.Core.Tests.csproj `
              -c Release --logger trx --results-directory $coreTestResults
          & $coverageTool collect --output $avaloniaCoverage --output-format coverage -- `
            dotnet test .\tests\FramePlayer.Avalonia.Tests\FramePlayer.Avalonia.Tests.csproj `
              -c Release --filter "Category!=ReleaseCandidate" --logger trx `
              --results-directory $avaloniaTestResults

          foreach ($testRun in @(
            @{ Name = "Core"; ResultsDirectory = $coreTestResults }
            @{ Name = "Avalonia"; ResultsDirectory = $avaloniaTestResults }
          )) {
            $trxFiles = @(Get-ChildItem -LiteralPath $testRun.ResultsDirectory -Filter *.trx -File)
            if ($trxFiles.Count -ne 1) {
              throw "$($testRun.Name) coverage run produced $($trxFiles.Count) TRX files; expected exactly one."
            }

            [xml]$trx = Get-Content -LiteralPath $trxFiles[0].FullName -Raw
            $executed = [int]$trx.TestRun.ResultSummary.Counters.executed
            if ($executed -lt 1) {
              throw "$($testRun.Name) coverage run did not execute any tests."
            }
          }

          & $coverageTool merge $coreCoverage $avaloniaCoverage --output $mergedCoverage --output-format xml
          $coverageXml = Get-Content -LiteralPath $mergedCoverage -Raw
          if ($coverageXml -notmatch '<module\b') {
            throw "Merged .NET coverage report did not contain any instrumented modules."
          }

          .\.sonar\scanner\dotnet-sonarscanner end `
            /d:sonar.token="$env:SONAR_TOKEN"
